name: CI/CD Pipeline

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: backend
        run: |
          uv sync --all-extras
          cp .env.example .env

      - name: Run linter (Ruff)
        working-directory: backend
        run: uv run ruff check . --output-format=github

      - name: Start Database
        working-directory: backend/timescaledb-env
        run: docker compose up -d --wait

      - name: Run tests (Pytest)
        working-directory: backend
        run: uv run pytest --cov --cov-report=xml --junitxml=pytest-report.xml

      - name: Backend Security (Bandit)
        working-directory: backend
        if: always()
        run: uvx bandit -r . -f json -o bandit-report.json

      - name: Upload backend reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-reports
          path: |
            backend/coverage.xml
            backend/pytest-report.xml
            backend/bandit-report.json

  frontend:
    name: Frontend (Nuxt)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run linter
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npx vitest run --no-file-parallelism --reporter=junit --outputFile=vitest-report.xml

      - name: Frontend Security (Audit)
        working-directory: frontend
        if: always()
        run: |
          npm audit --audit-level=high --json > npm-audit-report.json || true
          npm audit --audit-level=high

      - name: Upload frontend reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-reports
          path: |
            frontend/vitest-report.xml
            frontend/npm-audit-report.json

  security-scan:
    name: Security (Trivy & Scorecard)
    runs-on: ubuntu-24.04
    needs: [backend, frontend]
    permissions:
      security-events: write # Requis pour SARIF
      id-token: write       # Requis pour Scorecard
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Trivy (SARIF for Security Tab)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          vex: 'trivy-vex.json'
          severity: 'HIGH,CRITICAL'

      - name: Run Trivy (Table format for logs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload security artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            trivy-results.sarif
            scorecard-results.sarif

  build-and-push:
    name: Build & Push (GHCR)
    runs-on: ubuntu-24.04
    needs: [security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}-frontend:latest