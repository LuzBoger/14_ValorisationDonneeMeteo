name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Backend (install, lint, security, test)
      - uses: astral-sh/setup-uv@v5
      - name: Backend
        run: |
          cd backend
          uv sync --all-extras
          uv run ruff check .
          uvx bandit -r .
          # On lance les tests en mode basique
          uv run pytest

      # Frontend (install, lint, security, test)
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Frontend
        run: |
          cd frontend
          npm ci
          npm run lint
          npm audit --audit-level=high
          npm run test:ci

      # Docker (build, push on main)
      - name: Docker
        if: github.ref == 'refs/heads/main'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # Transformation du nom du repo en minuscules pour Docker
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$REPO_NAME/backend:latest ./backend
          docker build -t ghcr.io/$REPO_NAME/frontend:latest ./frontend
          docker push ghcr.io/$REPO_NAME/backend:latest
          docker push ghcr.io/$REPO_NAME/frontend:latest