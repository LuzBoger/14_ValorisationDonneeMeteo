name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write # Requis pour l'upload SARIF
    steps:
      - uses: actions/checkout@v4

      # Backend (install, lint, security, test)
      - uses: astral-sh/setup-uv@v5
      - name: Backend Lint
        run: |
          cd backend
          uv sync --all-extras
          uv run ruff check . --output-format=github

      - name: Backend Security
        if: always()
        run: |
          cd backend
          uvx bandit -r . -f json -o bandit-report.json

      - name: Backend Tests
        if: always()
        run: |
          cd backend
          uv run pytest --junitxml=pytest-report.xml

      # Frontend (install, lint, security, test)
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Frontend Dependencies
        if: always()
        run: |
          cd frontend
          npm ci

      - name: Frontend Lint
        if: always()
        run: |
          cd frontend
          npm run lint

      - name: Frontend Security
        if: always()
        run: |
          cd frontend
          npm audit --audit-level=high --json > npm-audit-report.json || true
          npm audit --audit-level=high

      - name: Frontend Tests
        if: always()
        run: |
          cd frontend
          npx vitest run --no-file-parallelism --reporter=junit --outputFile=vitest-report.xml

      # Trivy Scan (Repo & Security Reports)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          vex: 'trivy-vex.json' # Utilise le fichier VEX créé à la racine

      - name: Run Trivy (JSON report for artifacts)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-results.json'
          vex: 'trivy-vex.json'

      # Artefacts
      - name: Upload Test & Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-reports
          path: |
            backend/bandit-report.json
            backend/pytest-report.xml
            frontend/vitest-report.xml
            frontend/npm-audit-report.json
            trivy-results.sarif
            trivy-results.json
            trivy-vex.json

      # Upload SARIF to GitHub Security tab
      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Docker
        if: github.ref == 'refs/heads/main'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$REPO_NAME/backend:latest ./backend
          docker build -t ghcr.io/$REPO_NAME/frontend:latest ./frontend
          docker push ghcr.io/$REPO_NAME/backend:latest
          docker push ghcr.io/$REPO_NAME/frontend:latest